{% set name = "citeproc-py" %}
{% set version = "0.10.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/citeproc_py-{{ version }}.tar.gz
  sha256: 8d1f1104980cbc856efaada17ddc7e358519987c4f78c9d77a83fbb42c6f634f

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - pip
    - setuptools
    - python
    - rnc2rng >=2.6.1,!=2.6.2
  run:
    - lxml
    - python

test:
  source_files:
    - tests
  imports:
    - citeproc
  commands:
    - pip check
    # nose is not compatible with Python 3.12
    - nosetests --where=tests --ignore-files=citeproc-test.py  # [py<312]
    # I think this is cleaner than patching the missing file in
    # use the tag to keep the tests in sync with the release we are testing
    - curl https://raw.githubusercontent.com/citeproc-py/citeproc-py/v{{ version }}/tests/failing_tests.txt -o tests/failing_tests.txt
    - ls -l
    - ls -l tests
    - python tests/citeproc-test.py --no-update
  requires:
    - git
    - citeproc-py-styles
    - nose
    - pip
    - curl

about:
  home: https://github.com/brechtm/citeproc-py
  summary: Citations and bibliography formatter
  license: BSD-2-Clause AND CC-BY-SA-3.0 AND MIT

  license_file:
    - LICENSE
    - LICENSE_citation-style-language_locales.md
    - LICENSE_citation-style-language_schema.txt

extra:
  recipe-maintainers:
    - mikemhenry
